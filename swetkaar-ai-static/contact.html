<!doctype html>
<html lang="en" class="grain">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Contact — Swetkaar AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600;700&family=Cormorant+Garamond:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css">
  </head>
  <body>
    <!-- Animated Background Particles -->
    <div class="animated-bg-particles">
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
    </div>

    <header class="nav creative-nav">
      <div class="container nav-inner">
        <a href="index.html" class="brand creative-brand">
          <img src="assets/img/logo.png" alt="Swetkaar AI" class="logo" onerror="this.style.display='none'; this.nextElementSibling.style.display='inline';">
          <span style="display:none;">Swetkaar AI</span>
        </a>
        <nav class="creative-nav-menu">
          <div class="nav-menu-bg"></div>
          <div class="nav-menu-glow"></div>
          <a href="index.html" class="nav-link-creative">Home</a>
          <a href="about.html" class="nav-link-creative">About</a>
          <a href="services.html" class="nav-link-creative">Services</a>
          <a href="insights.html" class="nav-link-creative">Portfolio</a>
          <a href="contact.html" class="nav-link-creative">Contact</a>
        </nav>
      </div>
    </header>

    <main>
      <!-- Premium Hero Section -->
      <section class="page-hero-premium">
        <div class="page-hero-bg"></div>
        <div class="page-bg-gradient"></div>
        <div class="page-bg-shapes"></div>
        <div class="page-bg-pattern"></div>
        <div class="container">
          <div class="page-hero-content">
            <h1 class="page-hero-title creative-gradient-text">Let's move from idea to impact.</h1>
            <p class="page-hero-subtitle">Tell us your goals; we'll propose the fastest path to quality.</p>
          </div>
        </div>
      </section>

      <!-- Contact Form Section -->
      <section class="contact-form-section">
        <div class="page-bg-gradient"></div>
        <div class="page-bg-shapes"></div>
        <div class="page-bg-pattern"></div>
        <div class="container">
          <form class="contact-form-premium" onsubmit="event.preventDefault(); alert('Thanks! We\'ll get back within 24 hours.');">
            <div class="form-grid-premium">
              <div class="form-group-premium">
                <label for="name" class="form-label-premium">Name</label>
                <input id="name" type="text" required placeholder="Your name" class="form-input-premium">
              </div>
              <div class="form-group-premium">
                <label for="email" class="form-label-premium">Email</label>
                <input id="email" type="email" required placeholder="you@company.com" class="form-input-premium">
              </div>
            </div>
            <div class="form-grid-premium">
              <div class="form-group-premium">
                <label for="company" class="form-label-premium">Company</label>
                <input id="company" type="text" placeholder="Company name" class="form-input-premium">
              </div>
              <div class="form-group-premium">
                <label for="budget" class="form-label-premium">Budget</label>
                <select id="budget" class="form-input-premium">
                  <option>Undisclosed</option>
                  <option>$5k–$10k</option>
                  <option>$10k–$25k</option>
                  <option>$25k–$50k</option>
                  <option>$50k+</option>
                </select>
              </div>
            </div>
            <div class="form-group-premium">
              <label for="service" class="form-label-premium">Service Needed</label>
              <select id="service" class="form-input-premium">
                <option>Select a service</option>
                <option>AI Visuals</option>
                <option>Branding</option>
                <option>Web Development</option>
                <option>AI Automation Suite</option>
                <option>AI-Powered Digital Products</option>
                <option>AI Strategy & Consulting</option>
                <option>Multiple Services</option>
              </select>
            </div>
            <div class="form-group-premium">
              <label for="budget" class="form-label-premium">Budget <span class="form-optional">(optional)</span></label>
              <select id="budget" class="form-input-premium">
                <option>Prefer not to say</option>
                <option>$5k–$10k</option>
                <option>$10k–$25k</option>
                <option>$25k–$50k</option>
                <option>$50k+</option>
              </select>
            </div>
            <div class="form-group-premium">
              <label for="msg" class="form-label-premium">Brief Notes</label>
              <textarea id="msg" rows="6" placeholder="Tell us about your project goals, timeline, references, or any specific requirements..." class="form-textarea-premium"></textarea>
            </div>
            <div class="form-submit-wrapper">
              <button type="submit" class="btn-creative btn-primary-creative btn-large-creative">
                <span>Begin Your Project</span>
                <span class="btn-arrow">→</span>
              </button>
            </div>
          </form>
        </div>
      </section>
    </main>

    <footer class="footer-creative">
      <div class="container">
        <div class="footer-content-creative">
          <div class="footer-text-creative">© Swetkaar AI. Average response in 24 hours.</div>
          <div class="footer-links-creative">
            <a href="index.html" class="footer-link-creative">Back to Home</a>
          </div>
        </div>
      </div>
    </footer>

    <script src="assets/js/app.js"></script>
  </body>
</html>
